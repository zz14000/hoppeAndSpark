openapi: 3.0.3
info:
  title: Hope and Sparks API
  version: 1.0.0
  description: 'Apifox 导入版接口规范。详细业务说明、数据库落库规则和枚举映射见根目录

    `Hope_and_Sparks_API接口文档.md`。

    '
servers:
- url: http://localhost:8080
  description: 本地开发环境
- url: /
  description: 相对路径
security:
- bearerAuth: []
tags:
- name: 用户与认证
- name: Spark画像与首次引导
- name: 用户资料与个人中心
- name: Agent智能体
- name: Nebula探索与资源生成
- name: 学习资源库
- name: 视频学习
- name: 文档阅读
- name: 学习计划日历与拓扑
- name: 技能树
- name: 练习与测试
- name: 社区与文章
- name: 消息私信与群聊
- name: 通知
- name: 设置
- name: 设备与安全
- name: 文件上传
- name: Manage管理端
paths:
  /api/v1/auth/register:
    post:
      tags:
      - 用户与认证
      summary: 注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                  example: spark_1001
                  description: 登录账号，对应 sys_user.username
                email:
                  type: string
                  example: spark@example.com
                  description: 邮箱，对应 sys_user.email
                password:
                  type: string
                  example: '12345678'
                  description: 密码，服务端加密后写入 sys_user.password_hash
                nickname:
                  type: string
                  example: 一粒黑子
                  description: 昵称，对应 sys_user.nickname
              required:
              - username
              - password
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `username` | 是 | string | 登录账号，对应 sys_user.username |

        | Body | `password` | 是 | string | 密码，服务端加密后写入 sys_user.password_hash |

        | Body | `email` | 否 | string | 邮箱，对应 sys_user.email |

        | Body | `nickname` | 否 | string | 昵称，对应 sys_user.nickname |


        主要数据表：sys_user'
  /api/v1/auth/login:
    post:
      tags:
      - 用户与认证
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                account:
                  type: string
                  example: spark@example.com
                  description: 邮箱或用户名，对应 sys_user.email/sys_user.username
                password:
                  type: string
                  example: '12345678'
                  description: 密码，服务端加密后写入 sys_user.password_hash
                clientType:
                  type: string
                  example: web
                  enum:
                  - web
                  - android
                  - ios
                  description: 客户端类型：web/android/ios
                deviceId:
                  type: string
                  example: device_001
                  description: 设备标识，对应 user_login_session.device_id
              required:
              - account
              - password
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `account` | 是 | string | 邮箱或用户名，对应 sys_user.email/sys_user.username |

        | Body | `password` | 是 | string | 密码，服务端加密后写入 sys_user.password_hash |

        | Body | `clientType` | 否 | string | 客户端类型：web/android/ios |

        | Body | `deviceId` | 否 | string | 设备标识，对应 user_login_session.device_id |


        主要数据表：sys_user、user_login_session；登录响应中的 onboarded 可通过是否存在 user_profile 判断'
  /api/v1/auth/refresh:
    post:
      tags:
      - 用户与认证
      summary: 刷新 token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                sessionToken:
                  type: string
                  description: 登录会话令牌，对应 user_login_session.session_token
              required:
              - sessionToken
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `sessionToken` | 是 | string | 登录会话令牌，对应 user_login_session.session_token |


        主要数据表：sys_user、user_login_session'
  /api/v1/auth/logout:
    post:
      tags:
      - 用户与认证
      summary: 退出登录
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：user_login_session'
  /api/v1/auth/password/reset-request:
    post:
      tags:
      - 用户与认证
      summary: 找回密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                  description: 邮箱，对应 sys_user.email
                  format: email
                  example: spark@example.com
              required:
              - email
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `email` | 是 | string | 邮箱，对应 sys_user.email |


        主要数据表：sys_user'
  /api/v1/auth/password/reset-confirm:
    post:
      tags:
      - 用户与认证
      summary: 重置密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                resetToken:
                  type: string
                  description: 重置或校验凭证
                newPassword:
                  type: string
                  description: 新密码，服务端加密后写入 sys_user.password_hash
                  example: '12345678'
              required:
              - resetToken
              - newPassword
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `resetToken` | 是 | string | 重置或校验凭证 |

        | Body | `newPassword` | 是 | string | 新密码，服务端加密后写入 sys_user.password_hash |


        主要数据表：sys_user'
  /api/v1/onboarding/questions:
    get:
      tags:
      - Spark画像与首次引导
      summary: 获取画像引导问题
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：user_profile、agent_memory'
  /api/v1/onboarding/answers:
    post:
      tags:
      - Spark画像与首次引导
      summary: 提交单轮画像回答
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                questionId:
                  type: string
                  example: q_learning_goal
                  description: 题目 ID，对应 question_bank.id
                answer:
                  type: object
                  additionalProperties: true
                  description: 用户答案，按题型可为字符串、数组或对象
                answerText:
                  type: string
                  description: 文本答案
                selectedOptions:
                  type: array
                  items:
                    type: string
                  description: 选择题选项数组
              required:
              - questionId
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `questionId` | 是 | string | 题目 ID，对应 question_bank.id |

        | Body | `answer` | 否 | object | 用户答案，按题型可为字符串、数组或对象 |

        | Body | `answerText` | 否 | string | 文本答案 |

        | Body | `selectedOptions` | 否 | array<string> | 选择题选项数组 |


        主要数据表：user_profile、agent_memory'
  /api/v1/onboarding/complete:
    post:
      tags:
      - Spark画像与首次引导
      summary: 生成 Spark 画像
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：user_profile、agent_memory'
  /api/v1/spark-profile/rebuild:
    post:
      tags:
      - Spark画像与首次引导
      summary: 重新构建画像
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
                  description: 操作原因
                answers:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  description: 批量作答内容
              required:
              - reason
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `reason` | 是 | string | 操作原因 |

        | Body | `answers` | 否 | array<object> | 批量作答内容 |


        主要数据表：user_profile、agent_memory'
  /api/v1/user/current:
    get:
      tags:
      - 用户资料与个人中心
      summary: 获取当前用户
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/users/{userId}:
    get:
      tags:
      - 用户资料与个人中心
      summary: 获取指定用户主页
      parameters:
      - $ref: '#/components/parameters/userId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `userId` | 是 | string | 用户 ID，对应 sys_user.id |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/user/profile:
    put:
      tags:
      - 用户资料与个人中心
      summary: 更新个人资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                nickname:
                  type: string
                  description: 昵称，对应 sys_user.nickname
                  example: 一粒黑子
                avatar:
                  type: string
                  description: 头像地址，对应 sys_user.avatar_url
                bio:
                  type: string
                  description: 个人简介，对应 user_profile.bio
                learningDomain:
                  type: string
                  description: 学习方向，对应 user_profile.major_domain
                gradeLevel:
                  type: string
                  description: 学段/年级，对应 user_profile.grade_level
                knowledgeBaseLevel:
                  type: string
                  description: 基础水平，对应 user_profile.knowledge_base_level
                selfDiscipline:
                  type: string
                  description: 自律程度，对应 user_profile.self_discipline
                interests:
                  type: array
                  items:
                    type: string
                  description: 兴趣标签
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `nickname` | 否 | string | 昵称，对应 sys_user.nickname |

        | Body | `avatar` | 否 | string | 头像地址，对应 sys_user.avatar_url |

        | Body | `bio` | 否 | string | 个人简介，对应 user_profile.bio |

        | Body | `learningDomain` | 否 | string | 学习方向，对应 user_profile.major_domain |

        | Body | `gradeLevel` | 否 | string | 学段/年级，对应 user_profile.grade_level |

        | Body | `knowledgeBaseLevel` | 否 | string | 基础水平，对应 user_profile.knowledge_base_level |

        | Body | `selfDiscipline` | 否 | string | 自律程度，对应 user_profile.self_discipline |

        | Body | `interests` | 否 | array<string> | 兴趣标签 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/user/learning-stats:
    get:
      tags:
      - 用户资料与个人中心
      summary: 获取学习数据统计
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/user/collections:
    get:
      tags:
      - 用户资料与个人中心
      summary: 获取我的收藏
      parameters:
      - $ref: '#/components/parameters/type'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          $ref: '#/components/responses/PageSuccess'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Query | `type` | 否 | string | 类型筛选，具体枚举见接口文档数据字典 |

        | Query | `page` | 否 | integer | 页码，从 1 开始 |

        | Query | `pageSize` | 否 | integer | 每页数量 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
    post:
      tags:
      - 用户资料与个人中心
      summary: 收藏或取消收藏
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                targetType:
                  type: string
                  enum:
                  - resource
                  - article
                  - question
                  - course
                  description: 目标类型
                targetId:
                  type: string
                  description: 目标 ID
                action:
                  type: string
                  example: toggle
                  enum:
                  - collect
                  - uncollect
                  - toggle
                  description: 动作类型
              required:
              - targetType
              - targetId
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `targetType` | 是 | string | 目标类型 |

        | Body | `targetId` | 是 | string | 目标 ID |

        | Body | `action` | 否 | string | 动作类型 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/user/collections/{collectionId}:
    delete:
      tags:
      - 用户资料与个人中心
      summary: 删除收藏
      parameters:
      - $ref: '#/components/parameters/collectionId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `collectionId` | 是 | string | 收藏记录 ID，对应收藏/资源收藏表主键 |


        主要数据表：sys_user、user_profile、user_settings、user_resource_favorite、blog_favorite'
  /api/v1/agents:
    get:
      tags:
      - Agent智能体
      summary: 获取智能体列表
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | 无 | - | - | - | 无参数 |


        主要数据表：agent_chat_session、agent_chat_message、agent_graph_thread、agent_memory、async_generation_task'
  /api/v1/agent-sessions:
    post:
      tags:
      - Agent智能体
      summary: 创建对话会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                agentId:
                  type: string
                  example: nebula
                  description: 智能体 ID，如 nebula/coach/sage
                title:
                  type: string
                  description: 标题
                  example: 二叉搜索树章节课后练习
                contextNodeId:
                  type: string
                  description: 上下文知识点 ID，对应 knowledge_node.id
                contextResourceId:
                  type: string
                  description: 上下文资源 ID，对应 learning_resource.id
                metadata:
                  type: object
                  additionalProperties: true
                  description: 扩展元数据
              required:
              - agentId
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Body | `agentId` | 是 | string | 智能体 ID，如 nebula/coach/sage |

        | Body | `title` | 否 | string | 标题 |

        | Body | `contextNodeId` | 否 | string | 上下文知识点 ID，对应 knowledge_node.id |

        | Body | `contextResourceId` | 否 | string | 上下文资源 ID，对应 learning_resource.id |

        | Body | `metadata` | 否 | object | 扩展元数据 |


        主要数据表：agent_chat_session、agent_chat_message、agent_graph_thread、agent_memory、async_generation_task'
  /api/v1/agent-sessions/{sessionId}/messages:
    get:
      tags:
      - Agent智能体
      summary: 获取会话历史
      parameters:
      - $ref: '#/components/parameters/sessionId'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          $ref: '#/components/responses/PageSuccess'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `sessionId` | 是 | string | Agent 会话 ID，对应 agent_chat_session.id |

        | Query | `page` | 否 | integer | 页码，从 1 开始 |

        | Query | `pageSize` | 否 | integer | 每页数量 |


        主要数据表：agent_chat_session、agent_chat_message、agent_graph_thread、agent_memory、async_generation_task'
    post:
      tags:
      - Agent智能体
      summary: 发送消息给智能体
      parameters:
      - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                content:
                  type: string
                  description: 正文内容
                  example: 这里是正文内容
                contentType:
                  type: string
                  example: text
                  enum:
                  - text
                  - image
                  - file
                  - mixed
                  description: 内容类型
                attachments:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  description: 附件列表，对应 sys_oss_file
                stream:
                  type: boolean
                  example: true
                  description: 是否使用流式响应
              required:
              - content
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `sessionId` | 是 | string | Agent 会话 ID，对应 agent_chat_session.id |

        | Body | `content` | 是 | string | 正文内容 |

        | Body | `contentType` | 否 | string | 内容类型 |

        | Body | `attachments` | 否 | array<object> | 附件列表，对应 sys_oss_file |

        | Body | `stream` | 否 | boolean | 是否使用流式响应 |


        主要数据表：agent_chat_session、agent_chat_message、agent_graph_thread、agent_memory、async_generation_task'
  /api/v1/agent-sessions/{sessionId}/stream:
    get:
      tags:
      - Agent智能体
      summary: Agent 流式响应
      parameters:
      - $ref: '#/components/parameters/sessionId'
      - $ref: '#/components/parameters/messageIdQuery'
      responses:
        '200':
          description: SSE 流式响应
          content:
            text/event-stream:
              schema:
                type: string
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `sessionId` | 是 | string | Agent 会话 ID，对应 agent_chat_session.id |

        | Query | `messageId` | 是 | string | 消息 ID，对应 agent_chat_message.id 或 im_message.id |


        主要数据表：agent_chat_session、agent_chat_message、agent_graph_thread、agent_memory、async_generation_task'
  /api/v1/ai-disputes:
    post:
      tags:
      - Agent智能体
      summary: 举报 AI 内容争议
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                targetType:
                  type: string
                  enum:
                  - resource
                  - chat_message
                  - comment
                  - chunk
                  - system
                  description: 目标类型
                targetId:
                  type: string
                  description: 目标 ID
                issueType:
                  type: string
                  enum:
                  - hallucination
                  - inappropriate
                  - bug
                  - other
