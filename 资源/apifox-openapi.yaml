      - name: level
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          $ref: '#/components/responses/PageSuccess'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Query | `level` | 否 | string | 风险等级筛选 |

        | Query | `page` | 否 | integer | 页码，从 1 开始 |

        | Query | `pageSize` | 否 | integer | 每页数量 |


        主要数据表：sys_admin、sys_role、sys_admin_menu、sys_admin_resource、sys_admin_resource_category、sys_admin_role、sys_role_admin_menu、sys_role_admin_resource、feedback_ticket、kb_document、sys_operation_log、sys_agent_prompt'
  /api/v1/manage/moderation/behavior-alerts/{alertId}:
    put:
      tags:
      - Manage管理端
      summary: 处理行为预警
      parameters:
      - $ref: '#/components/parameters/alertId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - resolved
                  - ignored
                  description: status
                remark:
                  type: string
                  description: 备注
                action:
                  type: string
                  enum:
                  - warn
                  - ban
                  - ignore
                  - follow_up
                  description: 动作类型
              required:
              - status
      responses:
        '200':
          $ref: '#/components/responses/Success'
      description: '参数设计：


        | 位置 | 参数名 | 必填 | 类型 | 说明 |

        | --- | --- | --- | --- | --- |

        | Path | `alertId` | 是 | string | 行为预警 ID |

        | Body | `status` | 是 | string | status |

        | Body | `remark` | 否 | string | 备注 |

        | Body | `action` | 否 | string | 动作类型 |


        主要数据表：sys_admin、sys_role、sys_admin_menu、sys_admin_resource、sys_admin_resource_category、sys_admin_role、sys_role_admin_menu、sys_role_admin_resource、feedback_ticket、kb_document、sys_operation_log、sys_agent_prompt'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: 页码，从 1 开始
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
      description: 每页数量
    keyword:
      name: keyword
      in: query
      schema:
        type: string
      description: 搜索关键词
    type:
      name: type
      in: query
      schema:
        type: string
      description: 类型筛选，具体枚举见接口文档数据字典
    status:
      name: status
      in: query
      schema:
        type: string
      description: 状态筛选，具体枚举见接口文档数据字典
    startDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date
      description: 开始日期
    endDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date
      description: 结束日期
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: 用户 ID，对应 sys_user.id
    collectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
      description: 收藏记录 ID，对应收藏/资源收藏表主键
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: Agent 会话 ID，对应 agent_chat_session.id
    messageIdQuery:
      name: messageId
      in: query
      required: true
      schema:
        type: string
      description: 消息 ID，对应 agent_chat_message.id 或 im_message.id
    exploreId:
      name: exploreId
      in: path
      required: true
      schema:
        type: string
      description: 探索任务 ID，对应异步生成或探索记录
    resourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: string
      description: 学习资源 ID，对应 learning_resource.id
    readingId:
      name: readingId
      in: path
      required: true
      schema:
        type: string
      description: 拓展阅读资源 ID，对应 learning_resource.id
    caseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
      description: 代码案例资源 ID，对应 learning_resource.id
    videoId:
      name: videoId
      in: path
      required: true
      schema:
        type: string
      description: 视频资源 ID，对应 learning_resource.id
    documentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
      description: 文档 ID，对应 learning_resource.id 或 kb_document.id
    planId:
      name: planId
      in: path
      required: true
      schema:
        type: string
      description: 学习计划 ID，对应 study_plan.id
    planIdQuery:
      name: planId
      in: query
      schema:
        type: string
      description: 学习计划 ID，对应 study_plan.id
    nodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
      description: 知识点节点 ID，对应 knowledge_node.id，兼容 knowledge_node.node_code
    nodeIdQuery:
      name: nodeId
      in: query
      schema:
        type: string
      description: 知识点节点 ID，对应 knowledge_node.id，兼容 knowledge_node.node_code
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
      description: 日历事件/学习任务 ID，对应 study_task.id
    exerciseSetId:
      name: exerciseSetId
      in: path
      required: true
      schema:
        type: string
      description: 练习/测试集合 ID，对应 practice_set.id
    questionId:
      name: questionId
      in: path
      required: true
      schema:
        type: string
      description: 题目 ID，对应 question_bank.id
    attemptId:
      name: attemptId
      in: path
      required: true
      schema:
        type: string
      description: 作答记录/评估报告 ID，对应 user_question_record.id 或 evaluation_report.id
    articleId:
      name: articleId
      in: path
      required: true
      schema:
        type: string
      description: 文章 ID，对应 blog_post.id
    chatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
      description: 聊天会话 ID，对应 im_conversation.id
    requestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
      description: 好友申请 ID，对应 user_friend.id 或申请记录
    notificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
      description: 通知 ID
    loginSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: 登录会话 ID，对应 user_login_session.id
    disputeId:
      name: disputeId
      in: path
      required: true
      schema:
        type: string
      description: 争议工单 ID，对应 feedback_ticket.id
    promptId:
      name: promptId
      in: path
      required: true
      schema:
        type: string
      description: Prompt 配置 ID，对应 sys_agent_prompt.id
    recordId:
      name: recordId
      in: path
      required: true
      schema:
        type: string
      description: 审核记录 ID
    alertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
      description: 行为预警 ID
  requestBodies:
    RegisterBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              username:
                type: string
                example: spark_1001
                description: 登录账号，对应 sys_user.username
              email:
                type: string
                example: spark@example.com
                description: 邮箱，对应 sys_user.email
              password:
                type: string
                example: '12345678'
                description: 密码，服务端加密后写入 sys_user.password_hash
              nickname:
                type: string
                example: 一粒黑子
                description: 昵称，对应 sys_user.nickname
            required:
            - username
            - password
    LoginBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              account:
                type: string
                example: spark@example.com
                description: 邮箱或用户名，对应 sys_user.email/sys_user.username
              password:
                type: string
                example: '12345678'
                description: 密码，服务端加密后写入 sys_user.password_hash
              clientType:
                type: string
                example: web
                enum:
                - web
                - android
                - ios
                description: 客户端类型：web/android/ios
              deviceId:
                type: string
                example: device_001
                description: 设备标识，对应 user_login_session.device_id
            required:
            - account
            - password
    SessionTokenBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              sessionToken:
                type: string
                description: 登录会话令牌，对应 user_login_session.session_token
            required:
            - sessionToken
    EmailBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              email:
                type: string
                description: 邮箱，对应 sys_user.email
                format: email
                example: spark@example.com
            required:
            - email
    PasswordResetBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              resetToken:
                type: string
                description: 重置或校验凭证
              newPassword:
                type: string
                description: 新密码，服务端加密后写入 sys_user.password_hash
                example: '12345678'
            required:
            - resetToken
            - newPassword
    ChatMessageBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              content:
                type: string
                description: 正文内容
                example: 这里是正文内容
              contentType:
                type: string
                example: text
                enum:
                - text
                - image
                - file
                - mixed
                description: 内容类型
              attachments:
                type: array
                items:
                  type: object
                  additionalProperties: true
                description: 附件列表，对应 sys_oss_file
              stream:
                type: boolean
                example: true
                description: 是否使用流式响应
            required:
            - content
    AnswerBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              answer:
                oneOf:
                - type: string
                - type: array
                  items:
                    type: string
                - type: object
                  additionalProperties: true
                description: 用户答案，按题型可为字符串、数组或对象
              durationSeconds:
                type: integer
                description: 耗时或资源总时长，单位秒
              flagged:
                type: boolean
                description: 是否标记题目
              attachments:
                type: array
                items:
                  type: object
                  additionalProperties: true
                description: 附件列表，对应 sys_oss_file
            required:
            - answer
    CodeRunBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              language:
                type: string
                example: javascript
                description: 代码语言
              code:
                type: string
                description: 验证码或代码内容，按接口上下文区分
              input:
                type: string
                description: 自定义输入
              testcaseIds:
                type: array
                items:
                  type: string
                description: 测试用例 ID 列表
            required:
            - language
            - code
  responses:
    Success:
      description: 成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    PageSuccess:
      description: 分页成功
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/PageResult'
    AuthSuccess:
      description: 登录或刷新成功
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  type: object
                  properties:
                    accessToken:
                      type: string
                    sessionToken:
                      type: string
                    expiresIn:
                      type: integer
                      example: 7200
  schemas:
    ApiResponse:
      type: object
      required:
      - code
      - message
      - data
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          nullable: true
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
          - type: string
          - type: number
          - type: boolean
        requestId:
          type: string
          example: req_20260505_xxxx
    PageResult:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        total:
          type: integer
          example: 120
        list:
          type: array
          items:
            type: object
            additionalProperties: true
