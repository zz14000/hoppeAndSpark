spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hope_sparks}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:hope}
    password: ${MYSQL_PASSWORD:hope123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

hope:
  adapter-mode: local
  agent:
    mode: ${HOPE_AGENT_MODE:mock}
    coze-base-url: ${COZE_BASE_URL:https://api.coze.cn}
    coze-token: ${COZE_API_TOKEN:}
  llm:
    mode: ${HOPE_LLM_MODE:mock}
  queue:
    mode: ${HOPE_QUEUE_MODE:redis-stream}
  file:
    mode: ${HOPE_FILE_MODE:minio}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:hope}
    secret-key: ${MINIO_SECRET_KEY:hope123456}
    bucket: ${MINIO_BUCKET:hope-sparks}
  vector:
    mode: ${HOPE_VECTOR_MODE:mock}
    chroma-base-url: ${CHROMA_BASE_URL:http://localhost:8000}
