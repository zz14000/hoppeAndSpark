spring:
  application:
    name: hope-and-sparks
  datasource:
    url: ${HOPE_DB_URL:jdbc:mysql://localhost:3306/hope_sparks?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${HOPE_DB_USERNAME:root}
    password: ${HOPE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${HOPE_REDIS_HOST:localhost}
      port: ${HOPE_REDIS_PORT:6379}
      password: ${HOPE_REDIS_PASSWORD:01star}
      database: ${HOPE_REDIS_DATABASE:0}

server:
  port: 8080

hope:
  security:
    jwt:
      token-header: Authorization
      token-prefix: Bearer
      secret: ${HOPE_JWT_SECRET:hope-and-sparks-dev-secret-must-be-changed-at-deploy-time-2026}
      user-expiration: 7d
      admin-expiration: 12h
    redis:
      user-token-prefix: auth:user:token
      admin-token-prefix: auth:admin:token
    public-urls:
      - /actuator/**
      - /error
      - /api/v1/health
      - /api/v1/app/info
      - /api/v1/auth/register
      - /api/v1/auth/login
      - /api/v1/auth/refresh
      - /api/v1/auth/password/reset-request
      - /api/v1/auth/password/reset-confirm
      - /api/v1/manage/auth/register
      - /api/v1/manage/auth/login
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
