spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: hope-and-sparks
  datasource:
    url: ${HOPE_DB_URL:jdbc:mysql://localhost:3306/hope_sparks?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${HOPE_DB_USERNAME:root}
    password: ${HOPE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${HOPE_REDIS_HOST:localhost}
      port: ${HOPE_REDIS_PORT:6379}
      password: ${HOPE_REDIS_PASSWORD:01star}
      database: ${HOPE_REDIS_DATABASE:0}

server:
  port: 8080

hope:
  infra:
    minio:
      enabled: ${MINIO_ENABLED:true}
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:hope-sparks}
      presigned-expiry-minutes: ${MINIO_PRESIGNED_EXPIRY_MINUTES:30}
  ai:
    chat:
      provider: deepseek
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
    embedding:
      provider: dashscope
      base-url: ${ALIYUN_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${ALIYUN_DASHSCOPE_API_KEY:}
      model: ${ALIYUN_EMBEDDING_MODEL:text-embedding-v4}
    rerank:
      provider: dashscope
      base-url: ${ALIYUN_RERANK_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
      api-key: ${ALIYUN_DASHSCOPE_API_KEY:}
      model: ${ALIYUN_RERANK_MODEL:gte-rerank-v2}
    search:
      provider: ${SEARCH_PROVIDER:mock}
      api-key: ${TAVILY_API_KEY:}
      base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
      search-depth: ${TAVILY_SEARCH_DEPTH:basic}
      max-results: ${TAVILY_MAX_RESULTS:5}
    chroma:
      enabled: ${CHROMA_ENABLED:true}
      api-version: ${CHROMA_API_VERSION:v2}
      base-url: ${CHROMA_BASE_URL:http://localhost:8000}
      tenant-template: user_{userId}
      database-template: project_{projectId}
      local-cache-dir: ${KNOWLEDGE_CACHE_DIR:./target/knowledge-cache}
    mermaid:
      renderer: cli
      output-dir: ${MERMAID_OUTPUT_DIR:./target/mermaid}
    http:
      connect-timeout-ms: ${AI_HTTP_CONNECT_TIMEOUT_MS:3000}
      response-timeout-ms: ${AI_HTTP_RESPONSE_TIMEOUT_MS:60000}
  kb:
    parse:
      pending-batch-size: ${KB_PENDING_BATCH_SIZE:10}
    chunk:
      max-characters: ${KB_CHUNK_MAX_CHARACTERS:1200}
      overlap-characters: ${KB_CHUNK_OVERLAP_CHARACTERS:180}
      semantic-threshold: ${KB_CHUNK_SEMANTIC_THRESHOLD:0.82}
      enable-semantic: ${KB_CHUNK_ENABLE_SEMANTIC:true}
    ocr:
      enabled: ${KB_OCR_ENABLED:false}
      command: ${KB_OCR_COMMAND:tesseract}
      language: ${KB_OCR_LANGUAGE:chi_sim+eng}
  agent:
    runtime: ${HOPE_AGENT_RUNTIME:linear}
    graph:
      max-revisions: ${HOPE_AGENT_GRAPH_MAX_REVISIONS:2}
    memory:
      l1:
        ttl-minutes: ${HOPE_AGENT_MEMORY_L1_TTL_MINUTES:180}
      l2:
        enabled: ${HOPE_AGENT_MEMORY_L2_ENABLED:true}
    web-search:
      default-allowed: ${HOPE_AGENT_WEB_SEARCH_DEFAULT_ALLOWED:false}
  security:
    jwt:
      token-header: Authorization
      token-prefix: Bearer
      secret: ${HOPE_JWT_SECRET:hope-and-sparks-dev-secret-must-be-changed-at-deploy-time-2026}
      user-expiration: 7d
      admin-expiration: 12h
    redis:
      user-token-prefix: auth:user:token
      admin-token-prefix: auth:admin:token
    public-urls:
      - /actuator/**
      - /error
      - /api/v1/health
      - /api/v1/app/info
      - /api/v1/auth/register
      - /api/v1/auth/login
      - /api/v1/auth/refresh
      - /api/v1/auth/password/reset-request
      - /api/v1/auth/password/reset-confirm
      - /api/v1/manage/auth/register
      - /api/v1/manage/auth/login
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
